<header class="header">
  <div class="header-container">
    <div class="logo">
      <a routerLink="/">
        <h1>{{ "HEADER.TITLE" | translate }}</h1>
      </a>
    </div>

    <!-- Menu Desktop -->
    <nav class="main-nav">
      <ul>
        <li *ngFor="let item of menuItems">
          <a [routerLink]="item.path" routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }">{{ item.translationKey | translate }}</a>
        </li>
      </ul>
    </nav>

    <div class="auth-buttons desktop-only" style="margin-left: 20px; display: flex; gap: 10px; align-items: center;">
      <ng-container *ngIf="isLoggedIn; else loggedOutDesktop">
        <a routerLink="/admin"
          style="font-size: 14px; padding: 6px 12px; border-radius: 4px; background: #007bff; color: white; text-decoration: none;">Painel
          Admin</a>
        <button (click)="logout()"
          style="background: none; border: none; color: #dc3545; cursor: pointer; font-size: 14px; font-weight: bold;">Sair</button>
      </ng-container>
      <ng-template #loggedOutDesktop>
        <a routerLink="/login" style="font-size: 12px; color: #6c757d; text-decoration: none;">Acesso Restrito</a>
      </ng-template>
    </div>

    <!-- Botão Menu Mobile -->
    <button class="mobile-menu-button" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen">
      <div class="hamburger-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>

    <!-- Menu Mobile -->
    <div class="mobile-menu" [class.active]="isMobileMenuOpen">
      <nav>
        <ul>
          <li *ngFor="let item of menuItems">
            <a [routerLink]="item.path" routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: item.path === '/' }" (click)="toggleMobileMenu()">{{
              item.translationKey | translate }}</a>
          </li>
          <!-- Itens adicionais apenas para mobile -->
          <li class="mobile-only">
            <a routerLink="/eventos" (click)="toggleMobileMenu()">Eventos</a>
          </li>
          <li class="mobile-only">
            <a routerLink="/circulares" (click)="toggleMobileMenu()">Circulares</a>
          </li>
          <li class="mobile-only">
            <a routerLink="/ofertas" (click)="toggleMobileMenu()">Ofertas</a>
          </li>

          <li class="mobile-only auth-mobile-link"
            style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
            <ng-container *ngIf="isLoggedIn; else loggedOutMobile">
              <a routerLink="/admin" (click)="toggleMobileMenu()" style="color: #007bff;">Painel Admin</a>
              <a (click)="logout()" style="color: #dc3545; margin-top: 10px; cursor: pointer;">Sair</a>
            </ng-container>
            <ng-template #loggedOutMobile>
              <a routerLink="/login" (click)="toggleMobileMenu()" style="color: #6c757d;">Acesso Restrito</a>
            </ng-template>
          </li>
        </ul>
      </nav>

      <!-- Seletor de Idioma Mobile -->
      <div class="mobile-language-selector">
        <label>{{ "HEADER.LANGUAGE" | translate }}</label>
        <div class="custom-select" (click)="toggleLanguageDropdown()">
          <div class="selected-option">
            {{ getCurrentLanguageName() }}
            <span class="arrow"></span>
          </div>
          <div class="options-list" [class.show]="isLanguageDropdownOpen">
            <div class="option" *ngFor="let lang of languages" [class.selected]="currentLang === lang.code"
              (click)="selectLanguage(lang.code)">
              {{ lang.name }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Seletor de Idioma Desktop -->
    <div class="language-selector desktop-only">
      <select [(ngModel)]="currentLang" (change)="onLanguageChange($event)">
        <option *ngFor="let lang of languages" [value]="lang.code">
          {{ lang.code.toUpperCase() }}
        </option>
      </select>
    </div>
  </div>
</header>
