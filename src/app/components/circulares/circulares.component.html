<div class="restricted-container">
    <div class="header-section">
        <h2>{{ 'CIRCULAR.TITLE' | translate }}</h2>
        <p>{{ 'CIRCULAR.SUBTITLE' | translate }}</p>
    </div>

    <div *ngIf="loading" class="loading-state">
        <p>{{ 'COMMON.LOADING' | translate }}</p>
    </div>

    <div *ngIf="!loading && circulars.length === 0" class="empty-state">
        <p>{{ 'CIRCULAR.EMPTY_STATE' | translate }}</p>
    </div>

    <div class="cards-grid" *ngIf="!loading && circulars.length > 0">
        <mat-card *ngFor="let circular of circulars" class="doc-card">
            <mat-card-header>
                <div mat-card-avatar class="doc-icon">
                    <mat-icon>description</mat-icon>
                </div>
                <mat-card-title>{{ circular.title }}</mat-card-title>
                <mat-card-subtitle>{{ circular.date | date:'dd/MM/yyyy' }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-actions>
                <a mat-button color="primary" [href]="circular.file_url" target="_blank">
                    <mat-icon>download</mat-icon> {{ 'CIRCULAR.DOWNLOAD_PDF' | translate }}
                </a>
            </mat-card-actions>
        </mat-card>
    </div>
</div>
